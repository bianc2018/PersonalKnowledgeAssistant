<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Ubuntu, Cantarell, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: #f8fafc;
      color: #334155;
    }
    nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
    }
    .nav-brand {
      font-weight: 700;
      color: #0f172a;
      text-decoration: none;
    }
    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 12px;
    }
    .nav-links a {
      font-size: 13px;
      color: #475569;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .nav-links a:hover { background: #f1f5f9; color: #0f172a; }

    .center-card {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.06);
    }
    .center-card h2 {
      font-size: 22px;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .center-card .hint {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .row label { display: flex; align-items: center; gap: 8px; font-weight: 500; cursor: pointer; }
    .row a { font-size: 13px; color: #4f46e5; text-decoration: none; }
    .btn {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 20px 0;
      position: relative;
    }
    .divider span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 0 10px;
      font-size: 12px;
      color: #94a3b8;
    }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .btn-secondary:hover { background: #e2e8f0; }
    .footer { text-align: center; font-size: 13px; color: #64748b; margin-top: 16px; }
    .footer a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="index.html">PKA Mockups</a>
    <div class="nav-links">
      <a href="mockup-dashboard.html">Dashboard</a>
      <a href="mockup-knowledge-list.html">Knowledge</a>
      <a href="mockup-chat.html">Chat</a>
      <a href="mockup-research-list.html">Research</a>
      <a href="mockup-settings.html">Settings</a>
    </div>
  </nav>

  <div class="center-card">
    <h2>Welcome back</h2>
    <p class="hint">Sign in to your Personal Knowledge Assistant</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <div class="row">
      <label><input type="checkbox" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>
    <button class="btn btn-primary">Sign in</button>
    <div class="divider"><span>or</span></div>
    <button class="btn btn-secondary">Continue with passkey</button>
    <p class="footer">Don’t have an account? <a href="#">Create one</a></p>
  </div>
</body>
</html>
