installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_implement:
  - extension: qa
    command: speckit.qa.run
    enabled: true
    optional: true
    prompt: Run QA testing?
    description: Validates acceptance criteria through browser-driven or CLI-based
      testing
    condition: null
  - extension: ship
    command: speckit.ship.run
    enabled: true
    optional: true
    prompt: Ship this feature?
    description: Runs pre-flight checks, syncs branches, generates changelog, and
      creates PR
    condition: null
