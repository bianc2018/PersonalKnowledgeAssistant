<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Knowledge Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  <div x-data="{ sidebarOpen: false }" class="flex h-screen">
    <!-- mobile header -->
    <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex items-center justify-between px-4 z-30">
      <span class="font-semibold">PKA</span>
      <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700" aria-label="切换导航">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>

    <!-- sidebar -->
    <aside id="nav-sidebar" :class="sidebarOpen ? 'flex' : 'hidden'" class="fixed inset-y-0 left-0 z-20 w-64 flex-col border-r bg-white dark:bg-gray-800 md:static md:flex pt-14 md:pt-0">
      <div class="p-4 border-b dark:border-gray-700 font-bold text-lg truncate">Personal Knowledge Assistant</div>
      <nav class="flex-1 overflow-y-auto p-2 space-y-1" id="nav-links"></nav>
      <div class="p-3 border-t dark:border-gray-700 text-xs text-gray-500" id="nav-footer"></div>
    </aside>

    <!-- overlay -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/30 z-10 md:hidden" x-cloak></div>

    <!-- main content -->
    <main class="flex-1 overflow-auto pt-14 md:pt-0 relative">
      <div id="app"></div>
    </main>
  </div>

  <!-- toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
